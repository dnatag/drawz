name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: drawz-x86_64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: drawz-aarch64-unknown-linux-gnu.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: drawz-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: drawz-aarch64-apple-darwin.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        env:
          COPYFILE_DISABLE: "1"
        run: |
          cd target/${{ matrix.target }}/release
          chmod 755 drawz
          tar czf ../../../${{ matrix.artifact }} drawz
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums-sha256.txt

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: dnatag/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_AARCH64_DARWIN=$(sha256sum artifacts/drawz-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_X86_64_DARWIN=$(sha256sum artifacts/drawz-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(sha256sum artifacts/drawz-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(sha256sum artifacts/drawz-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/drawz.rb

          awk -v s1="$SHA_AARCH64_DARWIN" -v s2="$SHA_X86_64_DARWIN" \
              -v s3="$SHA_AARCH64_LINUX"  -v s4="$SHA_X86_64_LINUX" '
            /sha256/ { n++; sub(/"[^"]*"$/, "\"" (n==1?s1:n==2?s2:n==3?s3:s4) "\"") }
            { print }
          ' Formula/drawz.rb > Formula/drawz.rb.tmp && mv Formula/drawz.rb.tmp Formula/drawz.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/drawz.rb
          git commit -m "drawz ${GITHUB_REF_NAME}"
          git push
